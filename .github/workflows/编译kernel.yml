# 内核编译工作流 - 在 Ubuntu 24.04 ARM 上运行
name: 内核编译

# 手动触发，可指定内核版本
on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本号 (如 6.18)'
        required: true
        default: '6.18'

# 工作流配置
jobs:
  build-kernel:
    # 在 Ubuntu 24.04 ARM 上运行
    runs-on: ubuntu-24.04-arm
    
    # 设置权限，允许创建 Release
    permissions:
      contents: write   # 允许创建 Release 和上传文件
    
    # 定义环境变量
    env:
      BUILD_TIMESTAMP: ${{ format('{0}', github.run_id) }}-${{ github.run_number }}
    
    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
      
      # 安装编译依赖
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-aarch64-linux-gnu bc flex bison \
          7zip kmod bash cpio binutils tar git wget dpkg libssl-dev \
          libelf-dev python3 rsync debhelper-compat libdw-dev ccache
          
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
      
      # 缓存 ccache 目录
      - name: 缓存 ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-kernel-${{ inputs.kernel_version }}-${{ github.sha }}
          restore-keys: |
            ccache-kernel-${{ inputs.kernel_version }}-
            ccache-kernel-
      
      # 编译内核
      - name: 编译内核
        run: |          
          # 执行内核编译脚本
          sudo -E bash raphael-kernel_build.sh ${{ inputs.kernel_version }}
      
      # 获取当前时间戳
      - name: 获取构建时间
        id: get-timestamp
        run: |
          echo "timestamp=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      # 创建 GitHub Release 并上传产物
      - name: 创建 Release 并上传产物
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kernel-v${{ inputs.kernel_version }}
          name: "xiaomi raphael linux内核 v${{ inputs.kernel_version }}"
          body: |
            xiaomi raphael linux内核
            - 版本: ${{ inputs.kernel_version }}
            - 构建时间: ${{ steps.get-timestamp.outputs.timestamp }}
            - 构建 ID: ${{ env.BUILD_TIMESTAMP }}
          draft: false
          prerelease: false
          files: |
            linux-image-xiaomi-raphael.deb
            linux-headers-xiaomi-raphael.deb
            firmware-xiaomi-raphael.deb
            alsa-xiaomi-raphael.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 上传编译产物作为工作流制品
      - name: 上传内核包作为工作流制品
        uses: actions/upload-artifact@v4
        with:
          name: kernel-packages-v${{ inputs.kernel_version }}
          path: |
            *.deb
