# 统一的系统镜像构建工作流 - 在 Ubuntu 24.04 ARM 上运行
name: 构建系统镜像

# 手动触发，可指定所有参数
on:
  workflow_dispatch:
    inputs:
      system_type:
        description: '系统类型'
        required: true
        default: 'debian-desktop'
        type: choice
        options:
          - debian-desktop
          - debian-server
          - ubuntu-desktop
          - ubuntu-server
      kernel_version:
        description: '内核版本号 (从 Release 下载对应版本)'
        required: true
        default: '6.18'
      desktop_environment:
        description: '桌面环境 (仅适用于Desktop版本)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - phosh-core
          - phosh-full
          - phosh-phone

# 工作流配置
jobs:
  build-system-image:
    # 在 Ubuntu 24.04 ARM 上运行
    runs-on: ubuntu-24.04-arm
    
    # 设置权限，允许创建 Release
    permissions:
      contents: write
    
    # 定义环境变量
    env:
      SYSTEM_TYPE: ${{ inputs.system_type }}
      KERNEL_VERSION: ${{ inputs.kernel_version }}
      DESKTOP_ENV: ${{ inputs.desktop_environment || 'phosh-full' }}
    
    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
    
      # 安装debootstrap和7z
      - name: 安装构建工具
        run: |
          sudo apt update
          sudo apt install -y debootstrap
      
      # 从 GitHub Release 下载内核包
      - name: 下载内核编译产物
        run: |
          mkdir -p xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}
          
          curl -L -o xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}/linux-image-xiaomi-raphael.deb \
            "https://github.com/${{ github.repository }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/linux-image-xiaomi-raphael.deb"
          
          curl -L -o xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}/linux-headers-xiaomi-raphael.deb \
            "https://github.com/${{ github.repository }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/linux-headers-xiaomi-raphael.deb"
          
          curl -L -o xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}/firmware-xiaomi-raphael.deb \
            "https://github.com/${{ github.repository }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/firmware-xiaomi-raphael.deb"
          
          curl -L -o xiaomi-k20pro-boot.img \
            "https://github.com/GengWei1997/kernel-deb/releases/download/v1.0.0/xiaomi-k20pro-boot.img"
          
          if [[ "${{ env.SYSTEM_TYPE }}" == *"desktop"* ]]; then
            curl -L -o xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}/alsa-xiaomi-raphael.deb \
              "https://github.com/${{ github.repository }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/alsa-xiaomi-raphael.deb"
          fi
      
      # 根据系统类型选择构建脚本
      - name: 构建系统镜像
        run: |
          case "${{ env.SYSTEM_TYPE }}" in
            "debian-desktop")
              sudo bash debian-desktop_build.sh "${{ env.DESKTOP_ENV }}" "${{ env.KERNEL_VERSION }}"
              ;;
            "debian-server")
              sudo bash debian-server_build.sh "${{ env.KERNEL_VERSION }}"
              ;;
            "ubuntu-desktop")
              sudo bash ubuntu-desktop_build.sh "${{ env.DESKTOP_ENV }}" "${{ env.KERNEL_VERSION }}"
              ;;
            "ubuntu-server")
              sudo bash ubuntu-server_build.sh "${{ env.KERNEL_VERSION }}"
              ;;
          esac
      
      # 创建 GitHub Release 并上传镜像
      - name: 创建 Release 并上传镜像
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.SYSTEM_TYPE }}-v${{ env.KERNEL_VERSION }}
          name: ${{ env.SYSTEM_TYPE }} 镜像 v${{ env.KERNEL_VERSION }}
          body: ${{ env.SYSTEM_TYPE }} 镜像 v${{ env.KERNEL_VERSION }}
          draft: false
          prerelease: false
          files: |
            rootfs.7z
            xiaomi-k20pro-boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
