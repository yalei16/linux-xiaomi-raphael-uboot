# Kali Linux ARM64 Rootfs 构建工作流 - 红米K20 Pro (Raphael)
name: 构建 Kali Linux Rootfs

on:
  workflow_dispatch:
    inputs:
      desktop_environment:
        description: '桌面环境'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - gnome
          - kde
          - lxde
          - none
      rootfs_size:
        description: 'Rootfs 大小 (GB)'
        required: true
        default: '15'
      include_tools:
        description: '包含渗透测试工具集'
        required: true
        default: true
        type: boolean

env:
  DEBIAN_FRONTEND: noninteractive
  TZ: Asia/Shanghai

jobs:
  build-kali-rootfs:
    runs-on: ubuntu-24.04-arm
    
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装构建依赖
        run: |
          sudo apt update
          sudo apt install -y \
            debootstrap \
            qemu-user-static \
            binfmt-support \
            parted \
            kpartx \
            dosfstools \
            e2fsprogs \
            xz-utils \
            zstd \
            git \
            wget \
            curl \
            arch-install-scripts \
            qemu-utils

      - name: 创建 Kali Rootfs 构建脚本
        run: |
          cat > build-kali-rootfs.sh << 'SCRIPT_EOF'
          #!/bin/bash
          set -e
          
          DESKTOP_ENV="${1:-xfce}"
          ROOTFS_SIZE_GB="${2:-15}"
          INCLUDE_TOOLS="${3:-true}"
          WORK_DIR="/tmp/kali-rootfs"
          ROOTFS_IMG="${WORK_DIR}/rootfs.img"
          MOUNT_POINT="${WORK_DIR}/mnt"
          KERNEL_VERSION="6.18"
          
          # 清理并创建工作目录
          rm -rf "${WORK_DIR}"
          mkdir -p "${WORK_DIR}" "${MOUNT_POINT}"
          
          echo "=== 创建 rootfs 镜像 (${ROOTFS_SIZE_GB}GB) ==="
          dd if=/dev/zero of="${ROOTFS_IMG}" bs=1G count=${ROOTFS_SIZE_GB}
          mkfs.ext4 -F -L "KALIROOTFS" "${ROOTFS_IMG}"
          
          echo "=== 挂载镜像 ==="
          sudo mount -o loop "${ROOTFS_IMG}" "${MOUNT_POINT}"
          
          echo "=== 第一阶段：下载 Kali ARM64 基础系统 (foreign) ==="
          # 使用 --foreign 参数进行第一阶段
          sudo debootstrap \
            --foreign \
            --arch=arm64 \
            kali-rolling \
            "${MOUNT_POINT}" \
            http://http.kali.org/kali
          
          echo "=== 复制 QEMU 静态二进制文件 ==="
          sudo cp /usr/bin/qemu-aarch64-static "${MOUNT_POINT}/usr/bin/"
          
          echo "=== 第二阶段：完成 debootstrap ==="
          sudo chroot "${MOUNT_POINT}" /debootstrap/debootstrap --second-stage
          
          echo "=== 配置基础系统 ==="
          # 挂载伪文件系统
          sudo mount --bind /dev "${MOUNT_POINT}/dev"
          sudo mount --bind /proc "${MOUNT_POINT}/proc"
          sudo mount --bind /sys "${MOUNT_POINT}/sys"
          sudo mount --bind /dev/pts "${MOUNT_POINT}/dev/pts"
          
          # 配置 DNS
          sudo cp /etc/resolv.conf "${MOUNT_POINT}/etc/resolv.conf"
          
          echo "=== 配置 Kali 源和基础设置 ==="
          sudo chroot "${MOUNT_POINT}" bash -c '
            set -e
            # 配置官方 Kali 源
            cat > /etc/apt/sources.list << EOF
          deb http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware
          deb-src http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware
          EOF
          
            # 更新并安装关键包
            apt update || true
          
            # 先安装 ca-certificates 和 gnupg
            apt install -y --no-install-recommends ca-certificates gnupg || true
          
            # 安装 kali-archive-keyring
            apt install -y --no-install-recommends kali-archive-keyring || true
          
            # 再次更新
            apt update || true
          
            # 安装基础系统包（分批安装，避免单个包失败导致全部失败）
            echo "Installing essential packages..."
            apt install -y --no-install-recommends \
              locales tzdata keyboard-configuration console-setup \
              sudo adduser passwd \
              openssh-client openssh-server \
              net-tools iputils-ping iproute2 dnsutils \
              wget curl vim nano htop \
              dbus systemd systemd-sysv init-system-helpers \
              netcat-traditional nmap tcpdump \
              rsync || true
          
            # 安装网络相关包
            echo "Installing network packages..."
            apt install -y --no-install-recommends \
              network-manager wpasupplicant iw wireless-tools \
              usbutils pciutils usb-modeswitch modemmanager \
              dhcpcd5 ifupdown || true
          
            # 安装 USB 和库支持
            echo "Installing USB and library packages..."
            apt install -y --no-install-recommends \
              libusb-1.0-0 libusb-1.0-0-dev || true
          
            # 设置时区
            ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime || true
            echo "Asia/Shanghai" > /etc/timezone || true
          
            # 设置 locale
            if command -v locale-gen >/dev/null 2>&1; then
              echo "en_US.UTF-8 UTF-8" > /etc/locale.gen
              echo "zh_CN.UTF-8 UTF-8" >> /etc/locale.gen
              locale-gen || true
            fi
            if command -v update-locale >/dev/null 2>&1; then
              update-locale LANG=en_US.UTF-8 || true
            fi
          
            # 创建必要的组（如果不存在）
            groupadd -f netdev || true
            groupadd -f bluetooth || true
            groupadd -f sudo || true
            groupadd -f audio || true
            groupadd -f video || true
            groupadd -f dialout || true
            groupadd -f render || true
          
            # 创建用户
            if ! id user >/dev/null 2>&1; then
              useradd -m -s /bin/bash -G sudo,audio,video,netdev,dialout,bluetooth user || \
              useradd -m -s /bin/bash user || true
            fi
            echo "user:1234" | chpasswd || true
            echo "root:1234" | chpasswd || true
          
            # 配置 sudo 免密码
            mkdir -p /etc/sudoers.d
            echo "user ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/user
            chmod 440 /etc/sudoers.d/user || true
          
            # 允许 root SSH 登录
            mkdir -p /etc/ssh
            touch /etc/ssh/sshd_config
            if grep -q "PermitRootLogin" /etc/ssh/sshd_config 2>/dev/null; then
              sed -i "s/^#*PermitRootLogin.*/PermitRootLogin yes/" /etc/ssh/sshd_config
            else
              echo "PermitRootLogin yes" >> /etc/ssh/sshd_config
            fi
            if grep -q "PasswordAuthentication" /etc/ssh/sshd_config 2>/dev/null; then
              sed -i "s/^#*PasswordAuthentication.*/PasswordAuthentication yes/" /etc/ssh/sshd_config
            else
              echo "PasswordAuthentication yes" >> /etc/ssh/sshd_config
            fi
          
            # 使用 update-rc.d 启用 SSH (替代 systemctl)
            if [ -f /etc/init.d/ssh ]; then
              update-rc.d ssh defaults 2>/dev/null || true
              update-rc.d ssh enable 2>/dev/null || true
            fi
          '
          
          echo "=== 下载并安装小米 Raphael 内核 ==="
          # 下载内核包
          KERNEL_BASE_URL="https://github.com/yalei16/linux-xiaomi-raphael-uboot/releases/download/kernel-v6.18"
          DEB_DIR="${WORK_DIR}/kernel-debs"
          mkdir -p "${DEB_DIR}"
          
          wget -q --timeout=60 "${KERNEL_BASE_URL}/linux-image-xiaomi-raphael.deb" -O "${DEB_DIR}/linux-image.deb" || echo "Warning: Failed to download linux-image"
          wget -q --timeout=60 "${KERNEL_BASE_URL}/linux-headers-xiaomi-raphael.deb" -O "${DEB_DIR}/linux-headers.deb" || echo "Warning: Failed to download linux-headers"
          wget -q --timeout=60 "${KERNEL_BASE_URL}/firmware-xiaomi-raphael.deb" -O "${DEB_DIR}/firmware.deb" || echo "Warning: Failed to download firmware"
          wget -q --timeout=60 "${KERNEL_BASE_URL}/alsa-xiaomi-raphael.deb" -O "${DEB_DIR}/alsa.deb" || echo "Warning: Failed to download alsa"
          
          # 安装内核包到 rootfs
          if ls "${DEB_DIR}"/*.deb >/dev/null 2>&1; then
            sudo cp "${DEB_DIR}"/*.deb "${MOUNT_POINT}/tmp/"
            sudo chroot "${MOUNT_POINT}" bash -c '
              cd /tmp && for deb in *.deb; do dpkg -i "$deb" || true; done
              apt install -f -y || true
              rm -f *.deb
            '
          fi
          
          echo "=== 配置 WiFi (ath10k) ==="
          sudo chroot "${MOUNT_POINT}" bash -c '
            set -e
            # 安装 WiFi 固件和工具
            apt update || true
            apt install -y --no-install-recommends \
              firmware-ath10k firmware-atheros \
              crda wireless-regdb || true
          
            # 安装 qrtr 相关服务
            apt install -y --no-install-recommends \
              qrtr-tools pd-mapper tqftpserv rmtfs || true
          
            # 使用 update-rc.d 启用 NetworkManager (替代 systemctl)
            if [ -f /etc/init.d/network-manager ]; then
              update-rc.d network-manager defaults 2>/dev/null || true
              update-rc.d network-manager enable 2>/dev/null || true
            fi
          
            # 创建 WiFi 修复脚本
            cat > /usr/local/bin/wifi-fix.sh << "WIFIEOF"
          #!/bin/bash
          # WiFi 修复脚本 - 红米 K20 Pro
          
          # 启动 qrtr 服务
          modprobe qrtr 2>/dev/null || true
          modprobe qrtr-smd 2>/dev/null || true
          
          # 启动 pd-mapper
          if command -v pd-mapper >/dev/null 2>&1; then
            pd-mapper &
          fi
          
          # 启动 tqftpserv
          if command -v tqftpserv >/dev/null 2>&1; then
            tqftpserv &
          fi
          
          # 启动 rmtfs
          if command -v rmtfs >/dev/null 2>&1; then
            rmtfs -r &
          fi
          
          # 加载 ath10k 驱动
          modprobe ath10k_snoc 2>/dev/null || true
          modprobe ath10k_core 2>/dev/null || true
          
          # 重启 NetworkManager
          if command -v service >/dev/null 2>&1; then
            service network-manager restart 2>/dev/null || true
          fi
          
          echo "WiFi 修复完成"
          WIFIEOF
            chmod +x /usr/local/bin/wifi-fix.sh
          
            # 创建 systemd 服务文件 (用于真实系统启动后)
            cat > /etc/systemd/system/wifi-fix.service << "SVCEOF"
          [Unit]
          Description=WiFi Fix for Xiaomi Raphael
          After=systemd-modules-load.service
          Before=NetworkManager.service
          
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/wifi-fix.sh
          RemainAfterExit=yes
          
          [Install]
          WantedBy=multi-user.target
          SVCEOF
          
            # 创建符号链接启用服务 (替代 systemctl enable)
            mkdir -p /etc/systemd/system/multi-user.target.wants
            ln -sf /etc/systemd/system/wifi-fix.service /etc/systemd/system/multi-user.target.wants/wifi-fix.service 2>/dev/null || true
          '
          
          echo "=== 配置蓝牙 (QCA) ==="
          sudo chroot "${MOUNT_POINT}" bash -c '
            set -e
            apt update || true
            apt install -y --no-install-recommends \
              bluetooth bluez libbluetooth3 \
              blueman pulseaudio-module-bluetooth \
              hciattach || true
          
            # 使用 update-rc.d 启用蓝牙 (替代 systemctl)
            if [ -f /etc/init.d/bluetooth ]; then
              update-rc.d bluetooth defaults 2>/dev/null || true
              update-rc.d bluetooth enable 2>/dev/null || true
            fi
          
            # 创建蓝牙修复脚本
            cat > /usr/local/bin/bluetooth-fix.sh << "BTEOF"
          #!/bin/bash
          # 蓝牙修复脚本 - QCA 方案
          
          # 加载蓝牙驱动
          modprobe hci_uart 2>/dev/null || true
          modprobe hci_qca 2>/dev/null || true
          modprobe btbcm 2>/dev/null || true
          
          # 启动蓝牙服务
          if command -v service >/dev/null 2>&1; then
            service bluetooth start 2>/dev/null || true
          fi
          
          # 配置蓝牙
          if [ -e /dev/ttyHS0 ]; then
            hciattach /dev/ttyHS0 qca 115200 flow 2>/dev/null || true
          fi
          
          echo "蓝牙修复完成"
          BTEOF
            chmod +x /usr/local/bin/bluetooth-fix.sh
          
            # 创建蓝牙服务文件
            cat > /etc/systemd/system/bluetooth-fix.service << "BTSVCEOF"
          [Unit]
          Description=Bluetooth Fix for Xiaomi Raphael
          After=bluetooth.service
          Requires=bluetooth.service
          
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/bluetooth-fix.sh
          RemainAfterExit=yes
          
          [Install]
          WantedBy=multi-user.target
          BTSVCEOF
          
            # 创建符号链接启用服务 (替代 systemctl enable)
            ln -sf /etc/systemd/system/bluetooth-fix.service /etc/systemd/system/multi-user.target.wants/bluetooth-fix.service 2>/dev/null || true
          '
          
          echo "=== 配置 USB-SSH (NCM) ==="
          sudo chroot "${MOUNT_POINT}" bash -c '
            set -e
            apt update || true
            apt install -y --no-install-recommends \
              libusbgx0 dnsmasq || true
          
            # 使用 update-rc.d 启用 dnsmasq (替代 systemctl)
            if [ -f /etc/init.d/dnsmasq ]; then
              update-rc.d dnsmasq defaults 2>/dev/null || true
              update-rc.d dnsmasq enable 2>/dev/null || true
            fi
          
            # 配置 USB NCM Gadget
            mkdir -p /etc/usbgadget
            cat > /etc/usbgadget/setup.sh << "USBEEOF"
          #!/bin/bash
          # USB NCM Gadget 配置 - 172.16.42.1
          
          CONFIGFS="/sys/kernel/config/usb_gadget"
          GADGET_NAME="kali_ncm"
          USB_ID="0x18D1"  # Google
          PRODUCT_ID="0x4EE2"
          
          # 检查 configfs 是否挂载
          if [ ! -d "${CONFIGFS}" ]; then
            mount -t configfs none /sys/kernel/config 2>/dev/null || true
          fi
          
          # 创建 gadget
          mkdir -p ${CONFIGFS}/${GADGET_NAME} 2>/dev/null || true
          cd ${CONFIGFS}/${GADGET_NAME} 2>/dev/null || exit 1
          
          # 设置 USB 设备信息
          echo 0x0200 > bcdUSB 2>/dev/null || true
          echo 0x02 > bDeviceClass 2>/dev/null || true
          echo 0x00 > bDeviceSubClass 2>/dev/null || true
          echo 0x00 > bDeviceProtocol 2>/dev/null || true
          echo ${USB_ID} > idVendor 2>/dev/null || true
          echo ${PRODUCT_ID} > idProduct 2>/dev/null || true
          echo 0x0100 > bcdDevice 2>/dev/null || true
          
          # 创建字符串描述符
          mkdir -p strings/0x409 2>/dev/null || true
          echo "1234567890" > strings/0x409/serialnumber 2>/dev/null || true
          echo "Kali Linux" > strings/0x409/manufacturer 2>/dev/null || true
          echo "Kali Raphael" > strings/0x409/product 2>/dev/null || true
          
          # 创建配置
          mkdir -p configs/c.1/strings/0x409 2>/dev/null || true
          echo "NCM Config" > configs/c.1/strings/0x409/configuration 2>/dev/null || true
          echo 250 > configs/c.1/MaxPower 2>/dev/null || true
          
          # 创建 NCM 功能
          mkdir -p functions/ncm.usb0 2>/dev/null || true
          echo "00:00:00:00:00:01" > functions/ncm.usb0/host_addr 2>/dev/null || true
          echo "00:00:00:00:00:02" > functions/ncm.usb0/dev_addr 2>/dev/null || true
          
          # 绑定功能到配置
          ln -s functions/ncm.usb0 configs/c.1/ 2>/dev/null || true
          
          # 绑定到 USB 控制器
          UDC=$(ls /sys/class/udc/ 2>/dev/null | head -1)
          if [ -n "${UDC}" ]; then
            echo ${UDC} > UDC 2>/dev/null || true
          fi
          
          # 配置网络接口
          if command -v ifconfig >/dev/null 2>&1; then
            ifconfig usb0 172.16.42.1 netmask 255.255.255.0 up 2>/dev/null || \
            ip addr add 172.16.42.1/24 dev usb0 2>/dev/null || true
          fi
          
          # 配置 dnsmasq 提供 DHCP
          mkdir -p /etc/dnsmasq.d
          cat > /etc/dnsmasq.d/usb0.conf << DNSMASQ
          interface=usb0
          dhcp-range=172.16.42.2,172.16.42.254,255.255.255.0,1h
          dhcp-option=3,172.16.42.1
          dhcp-option=6,8.8.8.8,114.114.114.114
          DNSMASQ
          
          if command -v service >/dev/null 2>&1; then
            service dnsmasq restart 2>/dev/null || true
          fi
          USBEEOF
            chmod +x /etc/usbgadget/setup.sh
          
            # 创建 systemd 服务文件
            cat > /etc/systemd/system/usb-ncm-ssh.service << "NCMSVCEOF"
          [Unit]
          Description=USB NCM SSH Gadget
          After=network.target
          
          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/etc/usbgadget/setup.sh
          
          [Install]
          WantedBy=multi-user.target
          NCMSVCEOF
          
            # 创建符号链接启用服务 (替代 systemctl enable)
            ln -sf /etc/systemd/system/usb-ncm-ssh.service /etc/systemd/system/multi-user.target.wants/usb-ncm-ssh.service 2>/dev/null || true
          '
          
          echo "=== 配置 GPU (Adreno 640) ==="
          sudo chroot "${MOUNT_POINT}" bash -c '
            set -e
            apt update || true
            apt install -y --no-install-recommends \
              mesa-vulkan-drivers mesa-opencl-icd \
              libglx-mesa0 libgl1-mesa-dri libgl1-mesa-glx \
              libegl1-mesa libgbm1 libdrm2 \
              firmware-misc-nonfree || true
          
            # 配置 GPU 权限
            usermod -aG video user 2>/dev/null || true
            usermod -aG render user 2>/dev/null || true
          '
          
          echo "=== 安装桌面环境: ${DESKTOP_ENV} ==="
          case "${DESKTOP_ENV}" in
            xfce)
              sudo chroot "${MOUNT_POINT}" bash -c '
                set -e
                apt update || true
                apt install -y --no-install-recommends \
                  xfce4 xfce4-goodies xfce4-terminal \
                  lightdm lightdm-gtk-greeter \
                  xserver-xorg xserver-xorg-input-all xserver-xorg-video-fbdev || true
              
                # 使用 update-rc.d 启用 lightdm (替代 systemctl)
                if [ -f /etc/init.d/lightdm ]; then
                  update-rc.d lightdm defaults 2>/dev/null || true
                  update-rc.d lightdm enable 2>/dev/null || true
                fi
              '
              ;;
            gnome)
              sudo chroot "${MOUNT_POINT}" bash -c '
                set -e
                apt update || true
                apt install -y --no-install-recommends \
                  kali-desktop-gnome gdm3 || true
              
                # 使用 update-rc.d 启用 gdm3 (替代 systemctl)
                if [ -f /etc/init.d/gdm3 ]; then
                  update-rc.d gdm3 defaults 2>/dev/null || true
                  update-rc.d gdm3 enable 2>/dev/null || true
                fi
              '
              ;;
            kde)
              sudo chroot "${MOUNT_POINT}" bash -c '
                set -e
                apt update || true
                apt install -y --no-install-recommends \
                  kali-desktop-kde sddm || true
              
                # 使用 update-rc.d 启用 sddm (替代 systemctl)
                if [ -f /etc/init.d/sddm ]; then
                  update-rc.d sddm defaults 2>/dev/null || true
                  update-rc.d sddm enable 2>/dev/null || true
                fi
              '
              ;;
            lxde)
              sudo chroot "${MOUNT_POINT}" bash -c '
                set -e
                apt update || true
                apt install -y --no-install-recommends \
                  kali-desktop-lxde lightdm || true
              
                # 使用 update-rc.d 启用 lightdm (替代 systemctl)
                if [ -f /etc/init.d/lightdm ]; then
                  update-rc.d lightdm defaults 2>/dev/null || true
                  update-rc.d lightdm enable 2>/dev/null || true
                fi
              '
              ;;
            none)
              echo "跳过桌面环境安装"
              ;;
          esac
          
          echo "=== 配置触摸手势 (Touchegg) ==="
          sudo chroot "${MOUNT_POINT}" bash -c '
            set -e
            apt update || true
            apt install -y --no-install-recommends \
              touchegg xdotool wmctrl libinput-tools || true
          
            # 创建 touchegg 配置目录
            mkdir -p /etc/touchegg
          
            # 配置触摸手势
            cat > /etc/touchegg/touchegg.conf << TOUCHEGG
          <touchégg>
            <settings>
              <property name="composed_gestures_time">0</property>
            </settings>
            <application name="All">
              <gesture type="TAP" fingers="2" direction="UNKNOWN">
                <action type="MOUSE_CLICK">BUTTON=3</action>
              </gesture>
              <gesture type="TAP" fingers="1" direction="UNKNOWN">
                <action type="MOUSE_CLICK">BUTTON=1</action>
              </gesture>
              <gesture type="DOUBLE_TAP" fingers="1" direction="UNKNOWN">
                <action type="MOUSE_CLICK">BUTTON=1</action>
              </gesture>
              <gesture type="DRAG" fingers="2" direction="ALL">
                <action type="SCROLL">SPEED=1:INVERTED=false</action>
              </gesture>
              <gesture type="PINCH" fingers="2" direction="IN">
                <action type="ZOOM">ZOOM_OUT</action>
              </gesture>
              <gesture type="PINCH" fingers="2" direction="OUT">
                <action type="ZOOM">ZOOM_IN</action>
              </gesture>
              <gesture type="SWIPE" fingers="3" direction="UP">
                <action type="SEND_KEYS">Super</action>
              </gesture>
              <gesture type="SWIPE" fingers="3" direction="DOWN">
                <action type="SEND_KEYS">Escape</action>
              </gesture>
              <gesture type="SWIPE" fingers="4" direction="LEFT">
                <action type="CHANGE_DESKTOP">PREVIOUS</action>
              </gesture>
              <gesture type="SWIPE" fingers="4" direction="RIGHT">
                <action type="CHANGE_DESKTOP">NEXT</action>
              </gesture>
              <gesture type="LONG_PRESS" fingers="1" direction="UNKNOWN">
                <action type="MOUSE_CLICK">BUTTON=3</action>
              </gesture>
            </application>
          </touchégg>
          TOUCHEGG
          
            # 创建 systemd 服务文件
            cat > /etc/systemd/system/touchegg.service << "TOUCHSVCEOF"
          [Unit]
          Description=Touchegg Daemon
          After=graphical-session.target
          
          [Service]
          Type=simple
          ExecStart=/usr/bin/touchegg --daemon
          Restart=on-failure
          User=user
          Environment=DISPLAY=:0
          Environment=XAUTHORITY=/home/user/.Xauthority
          
          [Install]
          WantedBy=graphical.target
          TOUCHSVCEOF
          
            # 创建符号链接启用服务 (替代 systemctl enable)
            mkdir -p /etc/systemd/system/graphical.target.wants
            ln -sf /etc/systemd/system/touchegg.service /etc/systemd/system/graphical.target.wants/touchegg.service 2>/dev/null || true
          
            # 配置 X11 触摸
            mkdir -p /etc/X11/xorg.conf.d
            cat > /etc/X11/xorg.conf.d/99-touchscreen.conf << X11TOUCH
          Section "InputClass"
              Identifier "touchscreen"
              MatchIsTouchscreen "on"
              Driver "libinput"
              Option "Tapping" "on"
              Option "TappingDrag" "on"
              Option "TappingDragLock" "on"
              Option "NaturalScrolling" "true"
              Option "ScrollMethod" "twofinger"
              Option "ClickMethod" "clickfinger"
              Option "DisableWhileTyping" "false"
          EndSection
          X11TOUCH
          '
          
          echo "=== 配置屏幕键盘自动弹出 ==="
          sudo chroot "${MOUNT_POINT}" bash -c '
            set -e
            apt update || true
            apt install -y --no-install-recommends \
              onboard onboard-data xvkbd || true
          
            # 配置 Onboard 自动弹出
            mkdir -p /etc/onboard
            cat > /etc/onboard/onboard.gsettings << ONBOARD
          [org.onboard]
          auto-show=true
          auto-show-when-editing=true
          layout=/usr/share/onboard/layouts/Compact.onboard
          theme=/usr/share/onboard/themes/DarkRoom.theme
          xembed-onboard=true
          ONBOARD
          
            # 创建自动启动
            mkdir -p /home/user/.config/autostart
            cat > /home/user/.config/autostart/onboard.desktop << DESKTOP
          [Desktop Entry]
          Type=Application
          Name=Onboard
          Exec=/usr/bin/onboard
          Hidden=false
          NoDisplay=false
          X-GNOME-Autostart-enabled=true
          DESKTOP
          
            chown -R user:user /home/user/.config 2>/dev/null || true
          '
          
          echo "=== 配置电池/RTC/LED ==="
          sudo chroot "${MOUNT_POINT}" bash -c '
            set -e
            apt update || true
            apt install -y --no-install-recommends \
              upower acpi-support acpid i2c-tools || true
          
            # 使用 update-rc.d 启用服务 (替代 systemctl)
            if [ -f /etc/init.d/upower ]; then
              update-rc.d upower defaults 2>/dev/null || true
              update-rc.d upower enable 2>/dev/null || true
            fi
            if [ -f /etc/init.d/acpid ]; then
              update-rc.d acpid defaults 2>/dev/null || true
              update-rc.d acpid enable 2>/dev/null || true
            fi
          
            # 配置电池监控
            mkdir -p /etc/acpi/events
            cat > /etc/acpi/events/battery << ACPI
          event=battery.*
          action=/etc/acpi/battery.sh
          ACPI
          
            cat > /etc/acpi/battery.sh << BATSCRIPT
          #!/bin/bash
          # 电池状态监控脚本
          logger "Battery event: $1" 2>/dev/null || true
          BATSCRIPT
            chmod +x /etc/acpi/battery.sh
          
            # LED 控制脚本
            cat > /usr/local/bin/led-control.sh << LEDSCRIPT
          #!/bin/bash
          # LED 控制脚本
          # 手电筒/闪光灯控制
          
          LED_PATH="/sys/class/leds/flashlight"
          LED_PATH2="/sys/class/leds/torch-light"
          
          case "$1" in
            on)
              if [ -f \${LED_PATH}/brightness ]; then
                echo 100 > \${LED_PATH}/brightness 2>/dev/null && echo "LED 已开启" || echo "无法开启LED"
              elif [ -f \${LED_PATH2}/brightness ]; then
                echo 100 > \${LED_PATH2}/brightness 2>/dev/null && echo "LED 已开启" || echo "无法开启LED"
              else
                echo "未找到LED设备"
              fi
              ;;
            off)
              if [ -f \${LED_PATH}/brightness ]; then
                echo 0 > \${LED_PATH}/brightness 2>/dev/null && echo "LED 已关闭" || echo "无法关闭LED"
              elif [ -f \${LED_PATH2}/brightness ]; then
                echo 0 > \${LED_PATH2}/brightness 2>/dev/null && echo "LED 已关闭" || echo "无法关闭LED"
              fi
              ;;
            *)
              echo "用法: led-control.sh [on|off]"
              ;;
          esac
          LEDSCRIPT
            chmod +x /usr/local/bin/led-control.sh
          '
          
          echo "=== 安装渗透测试工具 ==="
          if [ "${INCLUDE_TOOLS}" = "true" ]; then
            sudo chroot "${MOUNT_POINT}" bash -c '
              set +e  # 允许单个包失败继续执行
              echo "Installing penetration testing tools..."
              apt update || true
              
              # 核心 Kali 工具集（使用元包，避免单独包名错误）
              echo "Installing Kali meta packages..."
              apt install -y --no-install-recommends \
                kali-linux-core \
                kali-linux-headless \
                kali-tools-top10 \
                kali-tools-wireless \
                kali-tools-web \
                kali-tools-forensics \
                kali-tools-reverse-engineering \
                kali-tools-exploitation \
                kali-tools-information-gathering \
                kali-tools-vulnerability \
                kali-tools-post-exploitation \
                kali-tools-crypto-stego \
                kali-tools-fuzzing \
                kali-tools-database \
                kali-tools-social-engineering \
                kali-tools-sniffing-spoofing \
                kali-tools-passwords \
                kali-tools-reporting \
                2>/dev/null || true
              
              # 单独安装常见工具（这些通常存在）
              echo "Installing common tools..."
              apt install -y --no-install-recommends \
                metasploit-framework \
                nmap \
                wireshark \
                aircrack-ng \
                john \
                hashcat \
                sqlmap \
                burpsuite \
                nikto \
                dirb \
                gobuster \
                hydra \
                ncrack \
                proxychains4 \
                tor \
                macchanger \
                recon-ng \
                theharvester \
                maltego-teeth \
                beef-xss \
                bettercap \
                wifite \
                reaver \
                pixiewps \
                hostapd \
                freeradius \
                asleap \
                hashcat-utils \
                hcxtools \
                hcxdumptool \
                netdiscover \
                arp-scan \
                masscan \
                zmap \
                dnsrecon \
                dnsenum \
                fierce \
                openvas-scanner \
                lynis \
                chkrootkit \
                rkhunter \
                clamav \
                sleuthkit \
                autopsy \
                foremost \
                scalpel \
                bulk-extractor \
                binwalk \
                radare2 \
                ghidra \
                edb-debugger \
                ollydbg \
                mingw-w64 \
                exe2hexbat \
                veil-evasion \
                empire \
                starkiller \
                poshc2 \
                sliver \
                armitage \
                bloodhound \
                sharphound \
                responder \
                impacket-scripts \
                crackmapexec \
                mimikatz \
                rubeus \
                winpeas \
                linpeas \
                linenum \
                pspy \
                2>/dev/null || true
              
              # 尝试安装一些可能不存在的工具（不中断）
              echo "Trying additional tools..."
              apt install -y --no-install-recommends \
                coWPAtty \
                immunity-debugger \
                shellter \
                thefatrat \
                covenant-kbx \
                silenttrinity \
                cobalt-strike \
                psexec \
                seatbelt \
                sharpup \
                privilege-escalation-awesome-scripts-suite \
                gtfobins \
                lolbas \
                2>/dev/null || echo "Some additional tools not available"
              
              echo "Penetration testing tools installation completed (some packages may be skipped)"
            '
          fi
          
          echo "=== 配置 fstab ==="
          sudo chroot "${MOUNT_POINT}" bash -c '
            # 获取 UUID
            ROOT_UUID=$(blkid -s UUID -o value /dev/sda33 2>/dev/null || echo "UUID_PLACEHOLDER")
            
            cat > /etc/fstab << FSTAB
          # /etc/fstab: static file system information
          #
          # <file system>                           <mount point>   <type>  <options>       <dump>  <pass>
          UUID=${ROOT_UUID}   /               ext4    errors=remount-ro  0       1
          /dev/sda32          none            swap    sw              0       0
          tmpfs               /tmp            tmpfs   defaults,nosuid,nodev  0   0
          FSTAB
          '
          
          echo "=== 配置主机名和 hosts ==="
          sudo chroot "${MOUNT_POINT}" bash -c '
            echo "kali-raphael" > /etc/hostname
            
            cat > /etc/hosts << HOSTS
          127.0.0.1       localhost
          127.0.1.1       kali-raphael
          
          # The following lines are desirable for IPv6 capable hosts
          ::1     localhost ip6-localhost ip6-loopback
          ff02::1 ip6-allnodes
          ff02::2 ip6-allrouters
          HOSTS
          '
          
          echo "=== 清理和优化 ==="
          sudo chroot "${MOUNT_POINT}" bash -c '
            # 清理 apt 缓存
            apt clean 2>/dev/null || true
            apt autoclean 2>/dev/null || true
            apt autoremove -y 2>/dev/null || true
            rm -rf /var/cache/apt/archives/* 2>/dev/null || true
            rm -rf /var/lib/apt/lists/* 2>/dev/null || true
            rm -rf /tmp/* 2>/dev/null || true
            rm -rf /var/tmp/* 2>/dev/null || true
            
            # 清理日志
            find /var/log -type f -exec truncate -s 0 {} \; 2>/dev/null || true
            
            # 创建首次启动脚本
            cat > /usr/local/bin/firstboot.sh << FIRSTBOOT
          #!/bin/bash
          # 首次启动配置
          
          # 重新生成 SSH 密钥
          rm -f /etc/ssh/ssh_host_*
          dpkg-reconfigure openssh-server 2>/dev/null || true
          
          # 扩展根分区
          resize2fs /dev/sda33 2>/dev/null || true
          
          # 禁用自身
          rm -f /etc/systemd/system/multi-user.target.wants/firstboot.service
          rm -f /usr/local/bin/firstboot.sh
          FIRSTBOOT
            chmod +x /usr/local/bin/firstboot.sh
          
            cat > /etc/systemd/system/firstboot.service << FBUNIT
          [Unit]
          Description=First Boot Configuration
          After=network.target
          
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/firstboot.sh
          RemainAfterExit=yes
          
          [Install]
          WantedBy=multi-user.target
          FBUNIT
          
            # 创建符号链接启用 firstboot 服务 (替代 systemctl enable)
            ln -sf /etc/systemd/system/firstboot.service /etc/systemd/system/multi-user.target.wants/firstboot.service 2>/dev/null || true
          '
          
          echo "=== 卸载和打包 ==="
          # 卸载伪文件系统
          sudo umount "${MOUNT_POINT}/dev/pts" 2>/dev/null || true
          sudo umount "${MOUNT_POINT}/dev" 2>/dev/null || true
          sudo umount "${MOUNT_POINT}/proc" 2>/dev/null || true
          sudo umount "${MOUNT_POINT}/sys" 2>/dev/null || true
          
          # 卸载镜像
          sudo umount "${MOUNT_POINT}" 2>/dev/null || true
          
          # 压缩镜像
          echo "=== 压缩 rootfs 镜像 ==="
          cd "${WORK_DIR}"
          zstd -T0 --ultra -22 -f "${ROOTFS_IMG}" -o "kali-raphael-rootfs.img.zst" 2>/dev/null || \
          gzip -c "${ROOTFS_IMG}" > "kali-raphael-rootfs.img.gz" || \
          cp "${ROOTFS_IMG}" "kali-raphael-rootfs.img"
          
          # 也创建 tar.gz 版本用于 TWRP 刷入
          echo "=== 创建 tar.gz 版本 ==="
          mkdir -p "${MOUNT_POINT}"
          sudo mount -o loop "${ROOTFS_IMG}" "${MOUNT_POINT}" 2>/dev/null || true
          
          if mountpoint -q "${MOUNT_POINT}"; then
            cd "${MOUNT_POINT}"
            sudo tar czpf "${WORK_DIR}/kali-raphael-rootfs.tar.gz" . 2>/dev/null || \
            echo "Warning: Failed to create tar.gz"
            cd "${WORK_DIR}"
            sudo umount "${MOUNT_POINT}" 2>/dev/null || true
          else
            echo "Warning: Cannot mount image for tar.gz creation"
          fi
          
          echo "=== 完成 ==="
          ls -lh "${WORK_DIR}"/*.{zst,gz,img} 2>/dev/null || ls -lh "${WORK_DIR}/"
          SCRIPT_EOF
          
          chmod +x build-kali-rootfs.sh

      - name: 执行 Kali Rootfs 构建
        run: |
          sudo bash build-kali-rootfs.sh \
            "${{ inputs.desktop_environment }}" \
            "${{ inputs.rootfs_size }}" \
            "${{ inputs.include_tools }}" 2>&1 | tee build.log
        timeout-minutes: 180
        continue-on-error: true

      - name: 准备上传文件
        run: |
          WORK_DIR="/tmp/kali-rootfs"
          mkdir -p release-files
          
          # 复制构建产物
          cp "${WORK_DIR}"/*.zst release-files/ 2>/dev/null || \
          cp "${WORK_DIR}"/*.gz release-files/ 2>/dev/null || \
          cp "${WORK_DIR}"/*.img release-files/ 2>/dev/null || \
          echo "Warning: No image files found"
          
          # 复制 tar.gz
          cp "${WORK_DIR}"/*.tar.gz release-files/ 2>/dev/null || \
          echo "Warning: No tar.gz file found"
          
          # 复制构建日志
          cp build.log release-files/ 2>/dev/null || true
          
          # 创建刷机说明
          cat > release-files/刷机说明.txt << 'README'
          =========================================
          Kali Linux for 红米 K20 Pro (Raphael)
          =========================================
          
          构建信息:
          - 桌面环境: ${{ inputs.desktop_environment }}
          - 包含渗透工具: ${{ inputs.include_tools }}
          - 镜像大小: ${{ inputs.rootfs_size }}GB
          
          已集成功能:
          ✅ Wi-Fi 2.4/5GHz (ath10k)
          ✅ 蓝牙 (QCA)
          ✅ USB-SSH (NCM 172.16.42.1)
          ✅ GPU (Adreno 640)
          ✅ 触摸手势 (双击/长按/滑动)
          ✅ 屏幕键盘自动弹出
          ✅ 电池/RTC/LED
          
          刷机方法1 - Fastboot (推荐):
          --------------------------------
          1. 解压 rootfs 镜像:
             zstd -d kali-raphael-rootfs.img.zst 2>/dev/null || \
             gunzip kali-raphael-rootfs.img.gz 2>/dev/null || true
          
          2. 进入 Fastboot 模式:
             adb reboot bootloader
          
          3. 刷入镜像:
             fastboot flash userdata kali-raphael-rootfs.img
             fastboot reboot
          
          刷机方法2 - TWRP 卡刷:
          --------------------------------
          1. 复制 kali-raphael-rootfs.tar.gz 到手机存储
          
          2. 进入 TWRP Recovery
          
          3. 挂载 /data 分区
          
          4. 清除目标分区数据 (如 sda33):
             dd if=/dev/zero of=/dev/block/sda33 bs=1M count=100
          
          5. 格式化为 ext4:
             mkfs.ext4 /dev/block/sda33
          
          6. 挂载分区并解压:
             mount /dev/block/sda33 /mnt
             tar xzpf /sdcard/kali-raphael-rootfs.tar.gz -C /mnt
          
          7. 重启系统
          
          首次启动:
          --------------------------------
          - 用户名: user
          - 密码: 1234
          - Root 密码: 1234
          - SSH: 连接 USB 后访问 172.16.42.1
          
          修复脚本:
          - /usr/local/bin/wifi-fix.sh - 修复 WiFi
          - /usr/local/bin/bluetooth-fix.sh - 修复蓝牙
          - /usr/local/bin/led-control.sh [on|off] - LED 控制
          
          内核来源:
          https://github.com/yalei16/linux-xiaomi-raphael-uboot
          README
          
          ls -lh release-files/ 2>/dev/null || echo "No files to list"

      # 方案一：分卷压缩（每个文件不超过1.9GB以安全上传到Release）
      - name: 分卷压缩大文件
        run: |
          cd release-files
          
          # 检查文件大小，如果超过1.9GB则进行分卷
          for file in *.img *.zst *.gz *.tar.gz; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null || echo "0")
              # 1.9GB = 2040109465 bytes
              if [ "$size" -gt 2040109465 ]; then
                echo "文件 $file 太大 (${size} bytes)，进行分卷压缩..."
                # 使用 1.5GB 分卷大小（留出安全余量）
                split -b 1500m "$file" "${file}.part."
                # 删除原文件，保留分卷
                rm -f "$file"
                # 创建合并说明
                echo "$file" > "${file}.reconstruct.txt"
                echo "分卷文件列表:" >> "${file}.reconstruct.txt"
                ls -1 "${file}.part."* >> "${file}.reconstruct.txt"
                echo "" >> "${file}.reconstruct.txt"
                echo "合并方法 (Linux/Mac):" >> "${file}.reconstruct.txt"
                echo "  cat ${file}.part.* > ${file}" >> "${file}.reconstruct.txt"
                echo "" >> "${file}.reconstruct.txt"
                echo "合并方法 (Windows CMD):" >> "${file}.reconstruct.txt"
                echo "  copy /b ${file}.part.aa + ${file}.part.ab + ... ${file}" >> "${file}.reconstruct.txt"
                echo "" >> "${file}.reconstruct.txt"
                echo "合并方法 (Windows PowerShell):" >> "${file}.reconstruct.txt"
                echo "  Get-Content ${file}.part.* -Raw | Set-Content ${file} -NoNewline" >> "${file}.reconstruct.txt"
              fi
            fi
          done
          
          # 列出最终文件
          echo "=== 最终待上传文件列表 ==="
          ls -lh

      # 方案二：上传到 GitHub Artifact（作为备选下载方式）
      - name: 上传到 GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kali-rootfs-${{ inputs.desktop_environment }}-${{ github.run_number }}
          path: release-files/*
          retention-days: 30
          compression-level: 0  # 已经压缩过了，不需要再压缩
        continue-on-error: true

      # 方案三：上传到 Release（支持大文件分卷）
      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kali-rootfs-${{ github.run_number }}-${{ github.run_attempt }}
          name: Kali Linux Rootfs for K20 Pro - ${{ inputs.desktop_environment }} (Attempt ${{ github.run_attempt }})
          body: |
            ## Kali Linux for 红米 K20 Pro (Raphael)
            
            ### 构建配置
            - **桌面环境**: ${{ inputs.desktop_environment }}
            - **包含渗透工具**: ${{ inputs.include_tools }}
            - **镜像大小**: ${{ inputs.rootfs_size }}GB
            
            ### ✅ 已集成功能
            - ✅ Wi-Fi 2.4/5GHz (ath10k + qrtr/pd-mapper/tqftpserv/rmtfs)
            - ✅ 蓝牙 (QCA hci_qca + hci_uart)
            - ✅ USB-SSH (NCM 172.16.42.1)
            - ✅ GPU (Adreno 640 + Mesa Vulkan)
            - ✅ 触摸手势 (Touchegg: 双击/长按/滑动/缩放)
            - ✅ 屏幕键盘自动弹出 (Onboard/Xvkbd)
            - ✅ 电池/RTC/LED 支持
            - ✅ 渗透测试工具集 (Kali Linux 工具，部分可能因仓库可用性而异)
            
            ### 📥 下载方式
            **方式1 - GitHub Release（推荐）:**
            直接下载下方 Assets 中的文件
            
            **方式2 - GitHub Artifact:**
            如果 Release 上传失败，请从页面顶部的 "Artifacts" 部分下载
            
            ### 📦 文件说明
            - `kali-raphael-rootfs.img.zst` / `.gz` - 压缩后的 rootfs 镜像（Fastboot 刷入）
            - `kali-raphael-rootfs.tar.gz` - TWRP 卡刷包（解压到分区）
            - `*.part.aa`, `*.part.ab`... - 分卷文件（如果原文件超过2GB）
            
            ### 🔧 分卷文件合并方法
            **Linux/Mac:**
            ```bash
            cat kali-raphael-rootfs.img.zst.part.* > kali-raphael-rootfs.img.zst
            ```
            
            **Windows CMD:**
            ```cmd
            copy /b kali-raphael-rootfs.img.zst.part.aa + kali-raphael-rootfs.img.zst.part.ab + ... kali-raphael-rootfs.img.zst
            ```
            
            **Windows PowerShell:**
            ```powershell
            Get-Content kali-raphael-rootfs.img.zst.part.* -Raw | Set-Content kali-raphael-rootfs.img.zst -NoNewline
            ```
            
            ### 刷机方法
            1. **Fastboot**: `fastboot flash userdata kali-raphael-rootfs.img`
            2. **TWRP**: 解压 tar.gz 到目标分区
            
            ### 登录信息
            - 用户名: `user` / 密码: `1234`
            - Root: `root` / 密码: `1234`
            - SSH: USB 连接后 `ssh user@172.16.42.1`
            
            ### 注意事项
            - 部分渗透测试工具可能因 Kali 仓库更新而不可用
            - 构建日志已附加，可查看具体安装了哪些包
            - 如果下载分卷文件，请务必下载所有 part 文件后再合并
          files: |
            release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
