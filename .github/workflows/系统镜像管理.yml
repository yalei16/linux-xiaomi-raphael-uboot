# 系统镜像管理 - 删除 Release 并触发构建

name: 系统镜像管理

# 手动触发
on:
  workflow_dispatch:
    inputs:
      action:
        description: '操作类型'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - delete
      delete_all:
        description: '删除所有版本的 Release (仅当 action 为 delete 时生效)'
        required: false
        default: false
        type: boolean
      system_type:
        description: '系统类型 (仅当 delete 时使用)'
        required: false
        default: 'debian-desktop'
        type: choice
        options:
          - debian-desktop
          - debian-server
          - ubuntu-desktop
          - ubuntu-server
      kernel_version:
        description: '内核版本号 (仅当 action 为 build 时生效)'
        required: false
        default: '6.18'

# 工作流配置
jobs:
  manage-releases:
    # 在 Ubuntu 24.04 ARM 上运行
    runs-on: ubuntu-24.04-arm
    
    # 设置权限
    permissions:
      contents: write
    
    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
      
      # 删除或构建
      - name: 删除或构建
        run: |
          if [ "${{ inputs.action }}" = "delete" ]; then
            if [ "${{ inputs.delete_all }}" = "true" ]; then
              echo "删除所有系统镜像 Release..."
              # 删除所有系统镜像 Release（不包括内核）
              gh release list --limit 100 | grep -E "(debian|ubuntu)-(desktop|server)" | awk '{print $2}' | xargs -I {} gh release delete --yes
            else
              echo "删除 ${{ inputs.system_type }} Release..."
              # 删除指定系统类型的 Release
              gh release list --limit 100 | grep "${{ inputs.system_type }}" | awk '{print $2}' | xargs -I {} gh release delete --yes
            fi
          elif [ "${{ inputs.action }}" = "build" ]; then
            echo "一键触发所有 4 个系统类型的构建..."
            
            # 桌面版：传递 phosh-core
            echo "触发 debian-desktop 构建..."
            gh workflow run "构建系统镜像" -f system_type="debian-desktop" -f kernel_version="${{ inputs.kernel_version }}" -f desktop_environment="phosh-core"
            
            echo "触发 ubuntu-desktop 构建..."
            gh workflow run "构建系统镜像" -f system_type="ubuntu-desktop" -f kernel_version="${{ inputs.kernel_version }}" -f desktop_environment="phosh-core"
            
            # Server 版：不传递 desktop_environment
            echo "触发 debian-server 构建..."
            gh workflow run "构建系统镜像" -f system_type="debian-server" -f kernel_version="${{ inputs.kernel_version }}"
            
            echo "触发 ubuntu-server 构建..."
            gh workflow run "构建系统镜像" -f system_type="ubuntu-server" -f kernel_version="${{ inputs.kernel_version }}"
            
            echo "所有 4 个系统类型的构建已触发！"
          else
            echo "未知操作: ${{ inputs.action }}"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
